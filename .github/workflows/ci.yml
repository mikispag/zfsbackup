name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: CGO_ENABLED=0 go build ./cmd/zfsbackup

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install build deps and test helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool gawk \
            libblkid-dev uuid-dev libudev-dev libssl-dev zlib1g-dev \
            libaio-dev libattr1-dev libelf-dev libtirpc-dev "linux-headers-$(uname -r)" \
            python3 python3-dev python3-setuptools python3-cffi \
            libffi-dev python3-packaging libcurl4-openssl-dev libpam0g-dev \
            bats mbuffer zstd gettext-base openssh-server
      - name: Build and install OpenZFS 2.3.4
        run: |
          set -euo pipefail
          ZFS_VERSION=2.3.4
          curl -fsSL -o /tmp/zfs.tar.gz \
            "https://github.com/openzfs/zfs/releases/download/zfs-${ZFS_VERSION}/zfs-${ZFS_VERSION}.tar.gz"
          mkdir -p /tmp/zfs-src
          tar -xzf /tmp/zfs.tar.gz -C /tmp/zfs-src --strip-components=1
          cd /tmp/zfs-src
          sh autogen.sh
          ./configure --prefix=/usr --sysconfdir=/etc \
            --libdir=/lib/x86_64-linux-gnu \
            --with-udevdir=/lib/udev
          make -s -j"$(nproc)"
          sudo make install
          sudo ldconfig
          sudo depmod -a
          sudo modprobe zfs
          zfs version
      - name: Create loopback ZFS pool
        run: |
          set -euo pipefail
          truncate -s 2G /tmp/zfsbackup-pool.img
          sudo zpool create -f testpool /tmp/zfsbackup-pool.img
          sudo zfs create testpool/zfsbackuptestsuite
          sudo chown "$USER" /tmp/zfsbackup-pool.img
          sudo zfs allow -ldu "$USER" bookmark,canmount,change-key,compression,create,destroy,diff,encryption,keyformat,keylocation,load-key,logbias,mount,mountpoint,promote,readonly,receive,rename,rollback,send,snapshot,userprop testpool/zfsbackuptestsuite
      - name: Run integration tests
        env:
          DELEGATED_FS: testpool/zfsbackuptestsuite
        run: |
          make integration-tests
