name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: CGO_ENABLED=0 go build ./cmd/zfsbackup

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install ZFS, bats, and helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            zfsutils-linux bats mbuffer zstd gettext-base openssh-server
          sudo modprobe zfs
      - name: Create loopback ZFS pool
        run: |
          set -euo pipefail
          truncate -s 2G /tmp/zfsbackup-pool.img
          sudo zpool create -f testpool /tmp/zfsbackup-pool.img
          sudo zfs create testpool/zfsbackuptestsuite
          sudo chown "$USER" /tmp/zfsbackup-pool.img
          sudo zfs allow -ldu "$USER" testpool/zfsbackuptestsuite \
            bookmark,canmount,change-key,compression,create,destroy,diff,encryption,\
keyformat,keylocation,load-key,logbias,mount,mountpoint,promote,readonly,\
receive,rename,rollback,send,snapshot,userprop
      - name: Run integration tests
        env:
          DELEGATED_FS: testpool/zfsbackuptestsuite
        run: |
          make integration-tests
